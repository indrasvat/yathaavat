name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --python python3.14 --all-extras

      - name: Format check
        run: uv run --python python3.14 ruff format --check

      - name: Lint
        run: uv run --python python3.14 ruff check

      - name: Type check
        run: uv run --python python3.14 mypy src tests

      - name: Test
        run: uv run --python python3.14 pytest

      - name: Shellcheck
        run: shellcheck install.sh

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --python python3.14 --all-extras

      - name: Format check
        run: uv run --python python3.14 ruff format --check

      - name: Lint
        run: uv run --python python3.14 ruff check

      - name: Type check
        run: uv run --python python3.14 mypy src tests

      - name: Test with coverage
        run: |
          uv run --python python3.14 pytest --cov=yathaavat --cov-report=term-missing:skip-covered --cov-report=xml:coverage.xml
          {
            echo "## Coverage"
            echo
            uv run --python python3.14 coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.xml
          flags: tests
          name: yathaavat-python-3.14
          fail_ci_if_error: true
          use_oidc: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}

      - name: Shellcheck
        run: shellcheck install.sh

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e11487 # v4
        with:
          fetch-depth: 0  # Full history for hatch-vcs version derivation

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464 # v4

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --python python3.14 --all-extras

      - name: Run checks
        run: |
          uv run --python python3.14 ruff format --check
          uv run --python python3.14 ruff check
          uv run --python python3.14 mypy src tests
          uv run --python python3.14 pytest
          shellcheck install.sh

      - name: Build wheel and sdist
        run: uv build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG_NAME" \
            dist/*.whl dist/*.tar.gz \
            --title "$TAG_NAME" \
            --generate-notes

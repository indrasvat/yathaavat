<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Drafting Paper Background -->
    <linearGradient id="blueprint_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Blueprint Grid Pattern -->
    <pattern id="drafting_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F0FF" stroke-opacity="0.1" stroke-width="1" />
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00F0FF" stroke-opacity="0.05" stroke-width="0.5" />
    </pattern>

    <!-- Technical Leader Line End -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00F0FF" />
    </marker>

    <!-- Ink Stamp / Blueprint Text Style -->
    <filter id="ink_bleed" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Drafting Table -->
  <rect width="1200" height="600" fill="url(#blueprint_bg)" />
  <rect width="1200" height="600" fill="url(#drafting_grid)" />

  <!-- COORDINATE MARKERS -->
  <g font-family="'SF Mono', monospace" font-size="10" fill="#00F0FF" opacity="0.3">
    <text x="10" y="20">A1</text><text x="595" y="20">A2</text><text x="1180" y="20">A3</text>
    <text x="10" y="305">B1</text><text x="1180" y="305">B3</text>
    <text x="10" y="590">C1</text><text x="1180" y="590">C3</text>
  </g>

  <!-- BACKGROUND: ASYNC TASK ARRAY -->
  <g transform="translate(850, 80) skewY(-15)" opacity="0.3">
    <path d="M 0 0 V 180 M 0 40 H 150 M 0 80 H 120 M 0 120 H 180" stroke="#00F0FF" stroke-width="1" stroke-dasharray="2 4" />
    <text x="10" y="-10" font-family="'SF Mono', monospace" font-size="11" fill="#00F0FF">SUB_ASSEMBLY: ASYNC_TASK_TREE</text>
    <circle r="3" fill="#00F0FF" />
  </g>

  <!-- LEFT MODULE: STACK ANALYZER -->
  <g transform="translate(80, 120) scale(0.9)">
    <rect width="240" height="280" rx="2" stroke="#00F0FF" stroke-width="1" stroke-dasharray="5 2" />
    <path d="M 0 40 H 240" stroke="#00F0FF" stroke-width="1" />
    <text x="10" y="25" font-family="'SF Mono', monospace" font-size="12" fill="#00F0FF" font-weight="bold">COMPONENT: STACK_TRACE</text>
    
    <g transform="translate(20, 70)" font-family="'SF Mono', monospace" font-size="11" fill="#E2E8F0">
      <circle r="4" fill="#00F0FF" />
      <text x="15" y="4" opacity="0.6">main.py:42</text>
      <path d="M 0 4 V 40" stroke="#00F0FF" stroke-width="1" stroke-dasharray="2 2" />
      <circle cy="40" r="4" fill="#00F0FF" />
      <text x="15" y="44" opacity="0.6">handle(ctx)</text>
      <path d="M 0 44 V 80" stroke="#00F0FF" stroke-width="1" stroke-dasharray="2 2" />
      <rect x="-10" y="80" width="200" height="30" stroke="#00F0FF" stroke-width="1" />
      <circle cy="95" r="5" fill="#00F0FF" />
      <text x="15" y="100" fill="#00F0FF" font-weight="bold">_cpu_primes(limit)</text>
    </g>
  </g>

  <!-- CENTER MODULE: EXECUTION CORE -->
  <g transform="translate(360, 60)">
    <rect width="480" height="420" stroke="#00F0FF" stroke-width="2" />
    <rect width="480" height="40" fill="#00F0FF" fill-opacity="0.1" />
    <text x="15" y="25" font-family="'SF Mono', monospace" font-size="14" fill="#00F0FF" font-weight="black">SCHEMATIC: CORE_RUNTIME_MIRROR</text>
    
    <g transform="translate(30, 80)" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#E2E8F0">
      <text y="0" opacity="0.4">114</text>
      <text x="40" y="0">match (ctx.method, ctx.path):</text>
      <text y="30" opacity="0.4">115</text>
      <text x="40" y="30">    case ("GET", "/health"):</text>

      <path d="M -10 45 H 450" stroke="#FF0055" stroke-width="1" stroke-dasharray="4 2" />
      <circle cx="-10" cy="61" r="8" stroke="#FF0055" stroke-width="2" />
      <text y="61" fill="#FF0055" font-weight="bold">116</text>
      <text x="40" y="61" fill="#FF0055">        return self._health(ctx)</text>

      <text y="91" opacity="0.4">117</text>
      <text x="40" y="91">    case ("GET", "/cpu/primes"):</text>

      <path d="M -10 105 H 450" stroke="#00F0FF" stroke-width="1" stroke-dasharray="4 2" />
      <path d="M -25 113 L -10 121 L -25 129 Z" fill="#00F0FF" />
      <text y="121" fill="#00F0FF" font-weight="bold">118</text>
      <text x="40" y="121" fill="#00F0FF">        return self._cpu_primes(ctx)</text>
    </g>

    <path d="M 480 121 L 520 121 L 520 180" stroke="#00F0FF" stroke-width="1" marker-end="url(#arrowhead)" />

    <!-- Terminal Transcript -->
    <rect x="20" y="300" width="440" height="100" stroke="#00F0FF" stroke-width="1" stroke-opacity="0.3" fill="#000" fill-opacity="0.5" />
    <text x="35" y="325" font-family="'SF Mono', monospace" font-size="11" fill="#00F0FF">SIGNAL: ATTACH_SAFE (PID: 8421)</text>
    <text x="35" y="345" font-family="'SF Mono', monospace" font-size="11" fill="#3FB950">STATUS: CPYTHON_3.14_DAP_OK</text>
    <text x="35" y="365" font-family="'SF Mono', monospace" font-size="11" fill="#FF0055">EVENT: BREAKPOINT_TRAP_HIT</text>
  </g>

  <!-- RIGHT MODULE: VARIABLE ARRAY -->
  <g transform="translate(880, 180) scale(0.9)">
    <rect width="240" height="240" stroke="#00F0FF" stroke-width="1" stroke-dasharray="5 2" />
    <path d="M 0 40 H 240" stroke="#00F0FF" stroke-width="1" />
    <text x="10" y="25" font-family="'SF Mono', monospace" font-size="12" fill="#00F0FF" font-weight="bold">MODULE: LOCAL_REGISTERS</text>
    
    <g transform="translate(15, 65)" font-family="'SF Mono', monospace" font-size="11" fill="#E2E8F0">
      <text y="0" opacity="0.6">REGISTER_01 [ctx]:</text>
      <text x="10" y="20">.id = <tspan fill="#FACC15">8421</tspan></text>
      <text x="10" y="40">.path = <tspan fill="#FACC15">"/cpu/primes"</tspan></text>
      <text y="80" opacity="0.6">REGISTER_02 [limit]:</text>
      <text x="10" y="100" fill="#00F0FF" font-weight="bold">200_000</text>
      <rect x="-5" y="120" width="210" height="40" stroke="#FF0055" stroke-width="1" fill="#FF0055" fill-opacity="0.05" />
      <text x="5" y="145" fill="#FF0055" font-weight="bold">STATE: VOLATILE_PAUSED</text>
    </g>
  </g>

  <!-- INDUSTRIAL TITLE BLOCK (Bottom Right Corner) -->
  <g transform="translate(850, 480)">
    <!-- Main Title Block Border -->
    <rect width="340" height="110" fill="#020617" stroke="#00F0FF" stroke-width="2" />
    
    <!-- Grid Lines for Title Block -->
    <path d="M 0 40 H 340 M 0 75 H 340 M 170 40 V 110" stroke="#00F0FF" stroke-width="1" />
    
    <!-- FIELD: PROJECT NAME -->
    <text x="10" y="15" font-family="'SF Mono', monospace" font-size="9" fill="#00F0FF" opacity="0.6">PROJECT_NAME:</text>
    <text x="10" y="32" font-family="'SF Mono', 'Fira Code', monospace" font-size="24" fill="#00F0FF" font-weight="900" filter="url(#ink_bleed)" style="letter-spacing: 4px;">YATHAAVAT</text>
    
    <!-- FIELD: DRAWING NO -->
    <text x="10" y="52" font-family="'SF Mono', monospace" font-size="8" fill="#00F0FF" opacity="0.6">DRAWING_NO:</text>
    <text x="10" y="65" font-family="'SF Mono', monospace" font-size="10" fill="#E2E8F0" font-weight="bold">SCH-PY314-DAP-001</text>
    
    <!-- FIELD: REVISION -->
    <text x="180" y="52" font-family="'SF Mono', monospace" font-size="8" fill="#00F0FF" opacity="0.6">REVISION:</text>
    <text x="180" y="65" font-family="'SF Mono', monospace" font-size="10" fill="#E2E8F0" font-weight="bold">v1.0.2-ALPHA</text>
    
    <!-- FIELD: DRAWN BY -->
    <text x="10" y="87" font-family="'SF Mono', monospace" font-size="8" fill="#00F0FF" opacity="0.6">DRAWN_BY:</text>
    <text x="10" y="100" font-family="'SF Mono', monospace" font-size="10" fill="#E2E8F0">INDRA_AGENT_01</text>
    
    <!-- FIELD: APPROVED -->
    <text x="180" y="87" font-family="'SF Mono', monospace" font-size="8" fill="#00F0FF" opacity="0.6">APPROVED_BY:</text>
    <text x="180" y="100" font-family="'SF Mono', monospace" font-size="10" fill="#E2E8F0">INDRA_SVAT</text>
  </g>

  <!-- AUXILIARY DATA BOX (Bottom Left) -->
  <g transform="translate(10, 520)">
    <text x="0" y="0" font-family="'SF Mono', monospace" font-size="9" fill="#00F0FF" opacity="0.4">ENVIRONMENT_SPECS:</text>
    <text x="0" y="15" font-family="'SF Mono', monospace" font-size="10" fill="#E2E8F0">RUNTIME: CPYTHON_3.14.0+</text>
    <text x="0" y="30" font-family="'SF Mono', monospace" font-size="10" fill="#E2E8F0">INTERFACE: TEXTUAL_TUI</text>
    <text x="0" y="45" font-family="'SF Mono', monospace" font-size="10" fill="#E2E8F0">ENGINE: DEBUGPY/DAP_STREAM</text>
    <path d="M 0 55 H 180" stroke="#00F0FF" stroke-width="1" stroke-opacity="0.2" />
  </g>

</svg>